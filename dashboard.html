<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GlideX Dashboard</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    h1 { text-align: center; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    th { background: #f4f4f4; }
    .error { color: red; }
    .loading { color: gray; }
  </style>
</head>
<body>
  <h1>GlideX - Available Cars</h1>
  <p id="status" class="loading">Loading cars...</p>

  <table id="carsTable" style="display:none;">
    <thead>
      <tr>
        <th>Name</th>
        <th>Status</th>
        <th>Price (KES)</th>
        <th>Seats</th>
        <th>Year</th>
        <th>Available</th>
        <th>Image</th>
      </tr>
    </thead>
    <tbody id="carsBody"></tbody>
  </table>

  <script>
    // --- Supabase Config ---
    const SUPABASE_URL = "https://mxzzsqpqblbzudrlhvjz.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im14enpzcXBxYmxienVkcmxodmp6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDkyMDU5NzAsImV4cCI6MjA2NDc4MTk3MH0.OGXHbp-5zn2bETy09eALL3X0QMYsl4YTXb-aaW0tFt0";
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function fetchCars() {
      const statusEl = document.getElementById("status");
      const table = document.getElementById("carsTable");
      const tbody = document.getElementById("carsBody");

      statusEl.textContent = "Loading cars...";

      let { data: cars, error } = await supabase
        .from("cars")
        .select("*") // get all columns first, you can narrow down later
        .limit(20);

      if (error) {
        console.error("Error fetching cars:", error);
        statusEl.textContent = "❌ Error loading cars.";
        statusEl.className = "error";
        return;
      }

      if (!cars || cars.length === 0) {
        statusEl.textContent = "No cars found.";
        return;
      }

      // Clear loading text
      statusEl.style.display = "none";
      table.style.display = "table";

      cars.forEach(car => {
        let row = document.createElement("tr");

        // Adjust column names to match your table
        row.innerHTML = `
          <td>${car.name || "-"}</td>
          <td>${car.status || "Available"}</td>
          <td>${car.price || 0}</td>
          <td>${car.seats || "-"}</td>
          <td>${car.year || "-"}</td>
          <td>${car.available ? "✅" : "❌"}</td>
          <td>
            ${car.image_urls 
              ? `<img src="${Array.isArray(car.image_urls) ? car.image_urls[0] : car.image_urls}" alt="car" width="80">` 
              : "No image"}
          </td>
        `;
        tbody.appendChild(row);
      });
    }

    document.addEventListener("DOMContentLoaded", fetchCars);
  </script>
</body>
</html>
