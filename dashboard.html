<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Glidexp</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="dashboard-body">

  <header class="dashboard-header">
    <img src="logo.png" alt="Glidexp Logo" class="logo">
    <h1 class="welcome-text">Welcome, User!</h1>
    <nav class="dashboard-nav">
      <a href="#">Account</a>
      <a href="#">Logout</a>
    </nav>
  </header>

  <main class="dashboard-main">
    <section class="car-list-section">
      <h2 class="section-title">Available Cars for Rent</h2>
      <div class="car-list" id="car-list">
        <p class="loading-message">Loading available cars...</p>
      </div>
    </section>
  </main>

  <footer class="dashboard-footer">
    <p>&copy; 2025 Glidexp</p>
  </footer>

  <!-- Supabase JS -->
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script>
    // Initialize Supabase
    const SUPABASE_URL = "https://mxzzsqpqblbzudrlhvjz.supabase.co";
    const SUPABASE_ANON_KEY =
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im14enpzcXBxYmxienVkcmxodmp6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDkyMDU5NzAsImV4cCI6MjA2NDc4MTk3MH0.OGXHbp-5zn2bETy09eALL3X0QMYsl4YTXb-aaW0tFt0";
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function fetchCars() {
      const carListContainer = document.getElementById("car-list");
      carListContainer.innerHTML = '<p class="loading-message">Loading available cars...</p>';

      try {
        // Fetch cars from Supabase
        const { data: cars, error } = await supabase
          .from("cars")
          .select("uuid, name, status, price, image_urls");

        if (error) {
          console.error("Supabase query error:", error.message);
          throw error;
        }

        if (cars && cars.length > 0) {
          carListContainer.innerHTML = "";
          cars.forEach((car) => {
            // image_urls is JSONB, so handle array or fallback
            let imageSrc = "promo.png";
            if (Array.isArray(car.image_urls) && car.image_urls.length > 0) {
              imageSrc = car.image_urls[0];
            } else if (typeof car.image_urls === "string") {
              imageSrc = car.image_urls;
            }

            const carCard = `
              <div class="car-card">
                <img src="${imageSrc}" alt="${car.name} image" class="car-image">
                <div class="car-info">
                  <h3 class="car-model">${car.name}</h3>
                  <p class="car-status">Status: <span>${car.status || "Available"}</span></p>
                  <p class="car-price">Price: KES ${car.price || "0"}/day</p>
                </div>
                <button class="rent-button">Rent Now</button>
              </div>
            `;
            carListContainer.innerHTML += carCard;
          });
        } else {
          carListContainer.innerHTML =
            '<p class="no-cars-message">No cars are currently available. Please check back later!</p>';
        }
      } catch (err) {
        console.error("Failed to fetch cars:", err);
        carListContainer.innerHTML =
          '<p class="error-message">Error loading cars. Please try again later.</p>';
      }
    }

    document.addEventListener("DOMContentLoaded", fetchCars);
  </script>
</body>
</html>
