<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GlideX - Reset Password</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-blue-50 flex items-center justify-center h-screen">
  <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
    <h2 class="text-2xl font-bold mb-4 text-blue-900 text-center">Reset Your Password</h2>
    <p class="mb-6 text-gray-600 text-center">Enter a new password for your account.</p>
    
    <div id="message" class="text-center mb-4 text-red-500"></div>
    
    <input type="password" id="password" placeholder="New Password" class="w-full mb-4 p-3 border rounded-lg border-gray-300">
    <input type="password" id="confirmPassword" placeholder="Confirm New Password" class="w-full mb-4 p-3 border rounded-lg border-gray-300">
    
    <button id="resetBtn" class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 transition">Reset Password</button>
  </div>

  <script>
    const supabaseUrl = 'YOUR_SUPABASE_URL';
    const supabaseKey = 'YOUR_SUPABASE_ANON_KEY';
    const supabase = supabase.createClient(supabaseUrl, supabaseKey);

    const messageEl = document.getElementById('message');
    const passwordInput = document.getElementById('password');
    const confirmInput = document.getElementById('confirmPassword');
    const resetBtn = document.getElementById('resetBtn');

    // Parse hash from URL
    const hashParams = new URLSearchParams(window.location.hash.substring(1));
    const token = hashParams.get('access_token');
    const type = hashParams.get('type');

    if (!token || type !== 'recovery') {
      messageEl.textContent = 'Invalid or expired password reset link.';
    }

    resetBtn.addEventListener('click', async () => {
      const newPassword = passwordInput.value;
      const confirmPassword = confirmInput.value;

      if (!newPassword || !confirmPassword) {
        messageEl.textContent = 'Please enter and confirm your new password.';
        return;
      }
      if (newPassword !== confirmPassword) {
        messageEl.textContent = 'Passwords do not match.';
        return;
      }

      messageEl.textContent = 'Resetting password...';

      // Set session with recovery token
      const { error: sessionError } = await supabase.auth.setSession(token);
      if (sessionError) {
        messageEl.textContent = 'Failed to set session: ' + sessionError.message;
        return;
      }

      // Update password
      const { error } = await supabase.auth.updateUser({ password: newPassword });
      if (error) {
        messageEl.textContent = error.message;
      } else {
        messageEl.style.color = 'green';
        messageEl.textContent = 'Password reset successfully! Redirecting to login...';
        setTimeout(() => { window.location.href = '/login.html'; }, 2000);
      }
    });
  </script>
</body>
</html>
