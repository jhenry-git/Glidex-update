<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - GlideX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-blue-50 text-gray-800 flex items-center justify-center min-h-screen p-4">

    <div id="loadingMessage" class="flex flex-col items-center">
        <div class="animate-spin rounded-full h-12 w-12 border-4 border-t-4 border-blue-500 border-opacity-50"></div>
        <p class="mt-4 text-lg text-gray-600">Checking link validity...</p>
    </div>

    <div id="resetForm" class="bg-white rounded-2xl shadow-xl p-8 max-w-md w-full hidden">
        <h1 class="text-3xl font-bold text-center text-blue-900 mb-6">Reset Your Password</h1>
        <p class="text-gray-600 text-center mb-6">Enter your new password below. Make sure it's at least 6 characters long.</p>

        <div id="messageBox" class="p-4 rounded-lg text-center mb-4 hidden"></div>

        <form id="passwordResetForm" class="space-y-4">
            <div>
                <label for="newPassword" class="block text-sm font-medium text-gray-700">New Password</label>
                <input type="password" id="newPassword" name="newPassword" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 p-2 border">
            </div>
            <div>
                <label for="confirmPassword" class="block text-sm font-medium text-gray-700">Confirm Password</label>
                <input type="password" id="confirmPassword" name="confirmPassword" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 p-2 border">
            </div>
            <button type="submit" id="resetButton" class="w-full bg-blue-600 text-white font-semibold py-2 px-4 rounded-lg hover:bg-blue-700 transition">
                Reset Password
            </button>
        </form>
    </div>

    <script type="module">
        // Replace with your actual Supabase project URL and anon key
        const SUPABASE_URL = 'YOUR_SUPABASE_URL';
        const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';
        
        const supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // DOM Elements
        const loadingMessage = document.getElementById('loadingMessage');
        const resetForm = document.getElementById('resetForm');
        const passwordResetForm = document.getElementById('passwordResetForm');
        const newPasswordInput = document.getElementById('newPassword');
        const confirmPasswordInput = document.getElementById('confirmPassword');
        const resetButton = document.getElementById('resetButton');
        const messageBox = document.getElementById('messageBox');

        const showMessage = (text, type = 'success') => {
            messageBox.textContent = text;
            messageBox.classList.remove('hidden', 'bg-red-200', 'text-red-800', 'bg-green-200', 'text-green-800');
            if (type === 'error') {
                messageBox.classList.add('bg-red-200', 'text-red-800');
            } else {
                messageBox.classList.add('bg-green-200', 'text-green-800');
            }
            messageBox.classList.remove('hidden');
        };

        const handlePasswordReset = async (event) => {
            event.preventDefault();
            const newPassword = newPasswordInput.value;
            const confirmPassword = confirmPasswordInput.value;

            if (newPassword !== confirmPassword) {
                showMessage('Passwords do not match.', 'error');
                return;
            }

            if (newPassword.length < 6) {
                showMessage('Password must be at least 6 characters long.', 'error');
                return;
            }

            resetButton.disabled = true;
            resetButton.textContent = 'Resetting...';
            showMessage('', 'hidden');

            const { error } = await supabase.auth.updateUser({
                password: newPassword,
            });

            if (error) {
                console.error("Password reset error:", error);
                const errorMessage = "Password reset failed. This link may be expired or invalid. Please request a new one.";
                showMessage(errorMessage, 'error');
            } else {
                showMessage('Your password has been reset successfully! You can now log in with your new password.', 'success');
                passwordResetForm.reset();
            }

            resetButton.disabled = false;
            resetButton.textContent = 'Reset Password';
        };

        const init = async () => {
            // Hide the form and show the loading message
            loadingMessage.classList.remove('hidden');
            resetForm.classList.add('hidden');

            // Listen for changes in authentication state
            const { data: { subscription } } = supabase.auth.onAuthStateChange(async (event, session) => {
                // If a user is logged in, that means the reset link was successful
                if (event === 'SIGNED_IN' && session) {
                    loadingMessage.classList.add('hidden');
                    resetForm.classList.remove('hidden');
                }
            });

            // Handle the URL hash to trigger the auth state change
            if (window.location.hash) {
                const params = new URLSearchParams(window.location.hash.substring(1));
                const accessToken = params.get('access_token');
                if (accessToken) {
                    // This is a temporary way to manually set the session.
                    // The onAuthStateChange listener will handle the rest.
                    await supabase.auth.setSession({ access_token: accessToken, refresh_token: null });
                }
            }
        };

        passwordResetForm.addEventListener('submit', handlePasswordReset);
        window.onload = init;
    </script>
</body>
</html>
